<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Interactive Gallery</title>
    <link rel="stylesheet" href="gallery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="gallery-container">
        <header>
            <h1> My Visual Diary</h1>
            <p>Explore a curated collection of breathtaking photography</p>
            
            <div class="filter-wrapper">
                <button class="filter-btn active" data-target="all">All</button>
                <button class="filter-btn" data-target="nature">Nature</button>
                <button class="filter-btn" data-target="architecture">Architecture</button>
                <button class="filter-btn" data-target="people">People</button>
            </div>
        </header>

        <main class="gallery-grid">
            <div class="gallery-item" data-category="nature">
                <div class="image-box">
                    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80" alt="Majestic Mountains">
                    <div class="overlay">
                        <span class="category">Nature</span>
                        <h3>Majestic Mountains</h3>
                        <div class="view-btn"><i class="fa-solid fa-expand"></i></div>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="architecture">
                <div class="image-box">
                    <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=600&q=80" alt="Cyberpunk Skyscraper">
                    <div class="overlay">
                        <span class="category">Architecture</span>
                        <h3>Modern Skyscraper</h3>
                        <div class="view-btn"><i class="fa-solid fa-expand"></i></div>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="people">
                <div class="image-box">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=600&q=80" alt="Serene Portrait">
                    <div class="overlay">
                        <span class="category">People</span>
                        <h3>Serene Portrait</h3>
                        <div class="view-btn"><i class="fa-solid fa-expand"></i></div>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <div class="image-box">
                    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=600&q=80" alt="Misty Forest">
                    <div class="overlay">
                        <span class="category">Nature</span>
                        <h3>Misty Forest</h3>
                        <div class="view-btn"><i class="fa-solid fa-expand"></i></div>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="architecture">
                <div class="image-box">
                    <img src="https://images.unsplash.com/photo-1511527661048-7fe73d85e9a4?auto=format&fit=crop&w=600&q=80" alt="Classic Cathedral">
                    <div class="overlay">
                        <span class="category">Architecture</span>
                        <h3>Classic Cathedral</h3>
                        <div class="view-btn"><i class="fa-solid fa-expand"></i></div>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="people">
                <div class="image-box">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=600&q=80" alt="Candid Smile">
                    <div class="overlay">
                        <span class="category">People</span>
                        <h3>Candid Smile</h3>
                        <div class="view-btn"><i class="fa-solid fa-expand"></i></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="lightbox">
        <span class="close-btn"><i class="fa-solid fa-xmark"></i></span>
        <button class="nav-btn prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="nav-btn next-btn"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="lightbox-content">
            <img src="" alt="Popup Image" class="lightbox-img">
            <div class="lightbox-caption">
                <span class="lightbox-category"></span>
                <h3 class="lightbox-title"></h3>
            </div>
        </div>
    </div>

    <script src="gallery.js"></script>
</body>
</html>
